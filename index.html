<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DALYPICH - ILO Assessment</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-content">
      <div class="logo-section">
        <svg class="yai-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <!-- Orange circle background -->
          <circle cx="100" cy="100" r="95" fill="#FF8C42"/>
          <!-- "Yai" text -->
          <text x="100" y="120" font-size="70" font-weight="bold" font-family="Arial, sans-serif" fill="#2C3E50" text-anchor="middle" letter-spacing="-2">Yai</text>
        </svg>
        <h1>Welcome to Digital Audit</h1>
      </div>

      <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </nav>
    </div>
    <div class="language-selector">
      <button class="lang-btn lang-btn-active" onclick="changeLanguage('km')" title="ភាសាខ្មែរ">
        <svg class="flag-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect width="100" height="100" fill="#002395"/>
          <rect y="33" width="100" height="33" fill="#E00432"/>
          <circle cx="50" cy="50" r="45" fill="none" stroke="#FFFFFF" stroke-width="2"/>
          <g transform="translate(50, 50)" fill="#FFFFFF">
            <path d="M0,-20 L4,-8 L16,-8 L6,0 L10,12 L0,6 L-10,12 L-6,0 L-16,-8 L-4,-8 Z"/>
            <path d="M0,-15 L2,-8 L8,-8 L3,0 L5,8 L0,4 L-5,8 L-3,0 L-8,-8 L-2,-8 Z" transform="translate(0,-8)"/>
            <path d="M0,-15 L2,-8 L8,-8 L3,0 L5,8 L0,4 L-5,8 L-3,0 L-8,-8 L-2,-8 Z" transform="translate(12,0)"/>
            <path d="M0,-15 L2,-8 L8,-8 L3,0 L5,8 L0,4 L-5,8 L-3,0 L-8,-8 L-2,-8 Z" transform="translate(-12,0)"/>
          </g>
        </svg>
        KH
      </button>
      <button class="lang-btn" onclick="changeLanguage('en')" title="English">
        <svg class="flag-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect width="100" height="100" fill="#012169"/>
          <path d="M0 0 L100 100 M100 0 L0 100" stroke="white" stroke-width="20"/>
          <path d="M50 0 L50 100 M0 50 L100 50" stroke="#C8102E" stroke-width="12"/>
        </svg>
        EN
      </button>
      <button class="lang-btn" onclick="changeLanguage('zh')" title="中文">
        <svg class="flag-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect width="100" height="100" fill="#DE2910"/>
          <polygon points="50,15 60,40 85,40 65,55 75,80 50,65 25,80 35,55 15,40 40,40" fill="#FFDE00"/>
          <polygon points="75,30 80,40 90,38 82,45 85,55 76,50 68,55 71,45 63,40 73,38" fill="#FFDE00"/>
          <polygon points="80,20 83,28 92,27 86,32 88,41 80,37 72,41 75,32 69,28 78,27" fill="#FFDE00"/>
          <polygon points="75,48 78,56 87,54 80,60 82,69 74,65 66,69 69,60 63,56 72,54" fill="#FFDE00"/>
          <polygon points="60,55 63,63 72,61 66,67 68,76 60,71 52,76 55,67 49,63 58,61" fill="#FFDE00"/>
        </svg>
        CN
      </button>
    </div>
  </header>

  <main>
    <div class="checklist-container">
      <div class="section-header">
        <span class="section-number">1.</span>
        <span class="section-title">ILO</span>
        <span class="section-progress" id="sectionProgress"></span>
      </div>

      <div id="checklistContent"></div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 DALYPICH. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
